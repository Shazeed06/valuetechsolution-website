<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Value Tech Solution">
  <g fill="currentColor">
    <!-- V — left thick stroke -->
    <path d="M14 18 L30 18 L52 78 L42 78 Z" />
    <!-- V — right stroke meeting at the bottom point -->
    <path d="M46 78 L56 78 L72 36 L62 36 Z" />
    <!-- Inner motion line — gives the V its lifting feel -->
    <path d="M28 70 L48 24 L42 24 L24 64 Z" opacity="0.55" />
  </g>
  <g
    fill="none"
    stroke="currentColor"
    stroke-width="9"
    stroke-linecap="square"
    stroke-linejoin="miter"
  >
    <!-- Arrow shaft — pierces from inside the V up to the top-right -->
    <line x1="40" y1="62" x2="86" y2="14" />
  </g>
  <g fill="currentColor">
    <!-- Arrowhead — open chevron pointing up-right -->
    <polygon points="86,14 70,16 84,30" />
    <polygon points="86,14 78,30 92,18" />
  </g>
</svg>
